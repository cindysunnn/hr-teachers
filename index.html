<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和泰集團講師智庫中心 - HRD 管理平台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif;
            background-color: #F5F5DC; /* 米白暖色 */
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1ebd9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d4cbb3;
            border-radius: 2px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #b8ad93;
        }
    </style>
</head>
<body class="text-stone-800 min-h-screen flex flex-col selection:bg-amber-200 selection:text-stone-900 relative">

    <nav class="border-b border-stone-300/60 bg-white/70 backdrop-blur-md sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-amber-500 to-amber-700 p-2 rounded-lg text-white shadow-md shadow-amber-600/20">
                    <i class="fa-solid fa-graduation-cap text-lg"></i>
                </div>
                <div>
                    <span class="text-lg font-bold tracking-wider text-stone-900">和泰集團講師智庫中心</span>
                    <span class="hidden sm:inline-block ml-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-amber-100 text-amber-800 border border-amber-200">HR Internal</span>
                </div>
            </div>
            <button onclick="openModal()" class="cursor-pointer flex items-center gap-2 bg-stone-900 hover:bg-stone-800 text-white font-medium px-4 py-2 rounded-lg shadow-md transition-all duration-300 transform hover:-translate-y-0.5 text-sm">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span>分享開課紀錄</span>
            </button>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
        
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-stone-900 tracking-tight mb-2">智能講師與課程數據庫</h1>
            <p class="text-stone-600 max-w-3xl text-sm sm:text-base leading-relaxed">
                整合集團內培訓記錄，人發夥伴可在此快速檢索歷年課程講師評價、參訓人數、學員層級與學員滿意度，實現數據驅動的精準人才培訓。
            </p>
        </div>

        <div class="bg-white/90 border border-stone-200 rounded-xl p-5 mb-8 shadow-sm space-y-4">
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between border-b border-stone-100 pb-4">
                <div class="flex items-center gap-2 w-full md:max-w-xl">
                    <div class="relative flex-1">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3 text-stone-400"></i>
                        <input type="text" id="searchInput" placeholder="輸入關鍵字（講師姓名、課程名稱、評語等）並按Enter或查詢..." 
                            class="w-full bg-stone-50 border border-stone-300 rounded-lg pl-11 pr-4 py-2 text-stone-800 placeholder-stone-400 focus:outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 transition-all duration-300 text-sm">
                    </div>
                    <button onclick="applyAllFilters()" class="cursor-pointer bg-stone-900 hover:bg-stone-800 text-white font-medium px-5 py-2 rounded-lg shadow-sm transition-colors text-sm shrink-0 flex items-center gap-1.5">
                        <i class="fa-solid fa-play text-xs"></i>
                        <span>查詢</span>
                    </button>
                </div>
                
                <div class="flex gap-6 text-xs sm:text-sm text-stone-500 w-full md:w-auto justify-between md:justify-end items-center">
                    <button onclick="resetFilters()" class="cursor-pointer text-xs text-amber-700 hover:text-amber-900 font-medium transition-colors flex items-center gap-1 bg-amber-50 px-2.5 py-1.5 rounded-md border border-amber-200/60">
                        <i class="fa-solid fa-arrow-rotate-left"></i> 重設所有條件
                    </button>
                    <div class="text-stone-600">
                        當前篩選：<span id="filterCount" class="text-amber-700 font-bold text-base">0</span> / <span id="totalCount" class="text-stone-500 font-normal">0</span> 筆
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-stone-600 flex items-center gap-1"><i class="fa-regular fa-calendar text-[10px]"></i> 開課年度</label>
                    <select id="filterYear" onchange="applyAllFilters()" class="w-full bg-stone-50 border border-stone-300 rounded-md py-1.5 px-2 text-xs text-stone-700 focus:outline-none focus:border-amber-600">
                        <option value="">全部年度</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-stone-600 flex items-center gap-1"><i class="fa-solid fa-building text-[10px]"></i> 開課公司</label>
                    <select id="filterCompany" onchange="applyAllFilters()" class="w-full bg-stone-50 border border-stone-300 rounded-md py-1.5 px-2 text-xs text-stone-700 focus:outline-none focus:border-amber-600">
                        <option value="">全部公司</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-stone-600 flex items-center gap-1"><i class="fa-solid fa-tags text-[10px]"></i> 課程類別</label>
                    <select id="filterCategory" onchange="applyAllFilters()" class="w-full bg-stone-50 border border-stone-300 rounded-md py-1.5 px-2 text-xs text-stone-700 focus:outline-none focus:border-amber-600">
                        <option value="">全部類別</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-stone-600 flex items-center gap-1"><i class="fa-solid fa-star text-[10px] text-amber-500"></i> 學員滿意度</label>
                    <select id="filterSatisfaction" onchange="applyAllFilters()" class="w-full bg-stone-50 border border-stone-300 rounded-md py-1.5 px-2 text-xs text-stone-700 focus:outline-none focus:border-amber-600">
                        <option value="">所有評分</option>
                        <option value="9.8">9.8 分以上</option>
                        <option value="9.5">9.5 分以上</option>
                        <option value="9.0">9.0 分以上</option>
                        <option value="8.5">8.5 分以上</option>
                        <option value="8.0">8.0 分以上</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-stone-600 flex items-center gap-1"><i class="fa-regular fa-clock text-[10px]"></i> 課程總時數</label>
                    <select id="filterHours" onchange="applyAllFilters()" class="w-full bg-stone-50 border border-stone-300 rounded-md py-1.5 px-2 text-xs text-stone-700 focus:outline-none focus:border-amber-600">
                        <option value="">所有時數</option>
                        <option value="short">3 小時(含)以下</option>
                        <option value="medium">3.5 ~ 6 小時</option>
                        <option value="long">6.5 小時以上</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="loadingState" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="bg-white/50 border border-stone-200 rounded-xl animate-pulse aspect-square"></div>
            <div class="bg-white/50 border border-stone-200 rounded-xl animate-pulse aspect-square"></div>
            <div class="bg-white/50 border border-stone-200 rounded-xl animate-pulse aspect-square"></div>
        </div>
        <div id="noDataState" class="hidden text-center py-16 bg-white/40 border border-dashed border-stone-300 rounded-xl">
            <i class="fa-regular fa-folder-open text-4xl text-stone-400 mb-3"></i>
            <p class="text-stone-500 font-medium">沒有找到符合當前複合條件的講師或課程紀錄</p>
        </div>
        <div id="card
