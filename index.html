<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>集團講師智庫中心 - HR 專屬管理平台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col selection:bg-cyan-500 selection:text-slate-900">

    <div class="absolute top-0 left-1/4 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute top-1/3 right-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl pointer-events-none"></div>

    <nav class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-cyan-500 to-blue-600 p-2 rounded-lg text-slate-900 shadow-lg shadow-cyan-500/20">
                    <i class="fa-solid fa-brain text-xl"></i>
                </div>
                <div>
                    <span class="text-lg font-bold tracking-wider bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">集團講師智庫中心</span>
                    <span class="hidden sm:inline-block ml-2 text-xs font-semibold px-2 py-0.5 rounded-full bg-slate-800 text-cyan-400 border border-cyan-500/20">HR Internal</span>
                </div>
            </div>
            <button onclick="openModal()" class="cursor-pointer flex items-center gap-2 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-900 font-semibold px-4 py-2 rounded-lg shadow-lg shadow-cyan-500/20 hover:shadow-cyan-400/30 transition-all duration-300 transform hover:-translate-y-0.5">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span>分享開課紀錄</span>
            </button>
        </div>
    </nav>

    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
        <div class="mb-10">
            <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">智能講師與課程數據庫</h1>
            <p class="text-slate-400 max-w-3xl text-sm sm:text-base leading-relaxed">
                整合集團內各公司的培訓資源，即時串接雲端智庫。人資夥伴可在此快速檢索講師評價、歷年課程、參訓人數與學員滿意度，實現數據驅動的精準人才培訓。
            </p>
        </div>

        <div class="bg-slate-900/60 border border-slate-800/80 rounded-xl p-5 mb-8 backdrop-blur-sm">
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="relative w-full md:max-w-md">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-500"></i>
                    <input type="text" id="searchInput" oninput="filterCards()" placeholder="搜尋講師姓名、課程類別、開課單位、關鍵字..." 
                        class="w-full bg-slate-950 border border-slate-800 rounded-lg pl-11 pr-4 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all duration-300 text-sm">
                </div>
                <div class="flex gap-6 text-xs sm:text-sm text-slate-400 w-full md:w-auto justify-end">
                    <div>資料總筆數：<span id="totalCount" class="text-cyan-400 font-bold text-base">0</span> 筆</div>
                    <div>當前篩選：<span id="filterCount" class="text-emerald-400 font-bold text-base">0</span> 筆</div>
                </div>
            </div>
        </div>

        <div id="loadingState" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-slate-900/40 border border-slate-800/50 rounded-xl p-6 animate-pulse h-64"></div>
            <div class="bg-slate-900/40 border border-slate-800/50 rounded-xl p-6 animate-pulse h-64"></div>
            <div class="bg-slate-900/40 border border-slate-800/50 rounded-xl p-6 animate-pulse h-64"></div>
        </div>

        <div id="noDataState" class="hidden text-center py-16 bg-slate-900/20 border border-dashed border-slate-800 rounded-xl">
            <i class="fa-regular fa-folder-open text-4xl text-slate-600 mb-3"></i>
            <p class="text-slate-500">找不到符合搜尋條件的講師或課程紀錄</p>
        </div>

        <div id="cardContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
    </main>

    <footer class="border-t border-slate-900 bg-slate-950/80 py-4 text-center text-xs text-slate-600">
        &copy; 2026 集團人資發展部 智慧智庫中心系統
    </footer>

    <div id="uploadModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-800 rounded-xl max-w-md w-full p-6 shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="flex justify-between items-start mb-4">
                <div class="flex items-center gap-2.5 text-cyan-400">
                    <i class="fa-solid fa-paper-plane text-lg"></i>
                    <h3 class="text-lg font-bold text-white">上報全新開課紀錄</h3>
                </div>
                <button onclick="closeModal()" class="cursor-pointer text-slate-500 hover:text-white transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <div class="space-y-4 text-sm text-slate-300 leading-relaxed mb-6">
                <p>為了確保資料庫的格式正確與安全性，系統已與現有的 Google 表單整合。</p>
                <div class="bg-slate-950 p-3.5 rounded-lg border border-slate-800/60 flex items-start gap-3">
                    <i class="fa-solid fa-circle-info text-cyan-500 mt-0.5"></i>
                    <p class="text-xs text-slate-400">在表單填寫完送出後，資訊會自動匯入 Google 試算表後台。此網頁重新整理（F5）即可看到最新的智庫卡片！</p>
                </div>
            </div>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSd31bVge9Z9MjCd7-9d97oNLariDefpLnRGWT_Mm_X4vsSxBw/viewform?usp=publish-editor" target="_blank" class="block text-center bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-900 font-bold py-3 px-4 rounded-lg transition-all duration-300 shadow-md shadow-cyan-500/10 mb-3">
                <i class="fa-solid fa-file-pen mr-2"></i>請點擊此處打開 Google 表單填寫新紀錄
            </a>
            <button onclick="closeModal()" class="cursor-pointer w-full bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs py-2 rounded-lg transition-colors">
                取消並返回網頁
            </button>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/1WU4oS8PNTziRGr27PuStirFV547BGX9nM6chvB8SuVI/gviz/tq?tqx=out:csv';
        let allRecords = [];

        document.addEventListener('DOMContentLoaded', () => { fetchData(); });

        async function fetchData() {
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error('網路回應不成功');
                const csvText = await response.text();
                allRecords = parseCSV(csvText);
                document.getElementById('totalCount').innerText = allRecords.length;
                renderCards(allRecords);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('cardContainer').classList.remove('hidden');
            } catch (error) {
                console.error(error);
                document.getElementById('loadingState').innerHTML = `
                    <div class="col-span-full text-center py-8 text-rose-400">
                        <i class="fa-solid fa-triangle-exclamation text-2xl mb-2"></i>
                        <p class="font-medium">無法讀取後台試算表資料</p>
                        <p class="text-xs text-slate-500 mt-1">請確認您的 Google 試算表已開啟「知道連結的任何人都可以檢視」權限。</p>
                    </div>`;
            }
        }

        function parseCSV(text) {
            const lines = []; let row = [""]; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i]; const next = text[i+1];
                if (c === '"') {
                    if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (c === ',' && !inQuotes) { row.push(''); } 
                else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') { i++; }
                    lines.push(row); row = [''];
                } else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row);
            if (lines.length <= 1) return [];
            lines.shift(); 
            return lines.map(cols => {
                return {
                    company: cols[0] || '未填寫', department: cols[1] || '未填寫', year: cols[2] || '',             
                    category: cols[3] || '未分類', courseName: cols[4] || '未填寫', target: cols[5] || '全員',        
                    teacher: cols[6] || '不具名', consulting: cols[7] || '無', hours: cols[8] || '0',           
                    students: cols[9] || '0', satisfaction: cols[10] || 'N/A', comment: cols[11] || '暫無回饋'   
                };
            });
        }

        function renderCards(data) {
            const container = document.getElementById('cardContainer');
            const noData = document.getElementById('noDataState');
            document.getElementById('filterCount').innerText = data.length;
            if (data.length === 0) { container.classList.add('hidden'); noData.classList.remove('hidden'); return; }
            noData.classList.add('hidden'); container.classList.remove('hidden');
            container.innerHTML = data.map(item => {
                let satValue = parseFloat(item.satisfaction);
                let satDisplay = isNaN(satValue) ? item.satisfaction : satValue.toFixed(2);
                return `
                    <div class="bg-slate-900/60 border border-slate-800 hover:border-slate-700/80 rounded-xl p-5 shadow-xl hover:shadow-cyan-500/5 transition-all duration-300 flex flex-col justify-between group">
                        <div>
                            <div class="flex flex-wrap items-center justify-between gap-2 mb-3">
                                <span class="text-xs font-semibold px-2 py-1 rounded bg-cyan-950 text-cyan-400 border border-cyan-900">${item.category}</span>
                                <span class="text-xs text-slate-500 font-medium">${item.company} · ${item.department}</span>
                            </div>
                            <h3 class="text-base font-bold text-white mb-2 group-hover:text-cyan-400 transition-colors">${item.courseName}</h3>
                            <div class="bg-slate-950/80 rounded-lg p-3 my-3 border border-slate-800/40">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs text-slate-400">授課講師</span>
                                    <span class="text-sm font-bold text-slate-200"><i class="fa-solid fa-user-tie text-xs text-cyan-500 mr-1"></i>${item.teacher}</span>
                                </div>
                                <div class="flex justify-between items-center text-xs">
                                    <span class="text-slate-400">合作管顧</span>
                                    <span class="text-slate-400">${item.consulting}</span>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-xs text-slate-400 mb-4 border-b border-slate-800/60 pb-3">
                                <div><i class="fa-regular fa-clock mr-1 text-slate-500"></i>時數：<span class="text-slate-300 font-medium">${item.hours} 小時</span></div>
                                <div><i class="fa-solid fa-users mr-1 text-slate-500"></i>人數：<span class="text-slate-300 font-medium">${item.students} 人</span></div>
                                <div><i class="fa-regular fa-calendar mr-1 text-slate-500"></i>年度：<span class="text-slate-300 font-medium">${item.year} 年</span></div>
                                <div><i class="fa-solid fa-bullseye mr-1 text-slate-500"></i>對象：<span class="text-slate-300 font-medium truncate inline-block max-w-[100px] align-bottom">${item.target}</span></div>
                            </div>
                        </div>
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-xs text-slate-500">學員滿意度</span>
                                <div class="flex items-center gap-1">
                                    <i class="fa-solid fa-star text-amber-500 text-xs"></i>
                                    <span class="text-sm font-bold text-amber-400">${satDisplay}</span>
                                </div>
                            </div>
                            <div class="bg-slate-950/40 p-2.5 rounded border border-slate-800/30">
                                <p class="text-xs text-slate-400 italic line-clamp-2" title="${item.comment}">「 ${item.comment} 」</p>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function filterCards() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!query) { renderCards(allRecords); return; }
            const filtered = allRecords.filter(item => {
                return Object.values(item).some(val => String(val).toLowerCase().includes(query));
            });
            renderCards(filtered);
        }

        function openModal() {
            const modal = document.getElementById('uploadModal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); modal.querySelector('div').classList.remove('scale-95'); }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('uploadModal');
            modal.classList.add('opacity-0'); modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }
    </script>
</body>
</html>
